# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"

# Unbind omarchy defaults that conflict with custom bindings
unbind = SUPER, G              # was: toggle window grouping (now workspace 5)
unbind = SUPER, J              # was: toggle window split (now vim nav down)
unbind = SUPER, K              # was: show keybindings (use omarchy-menu instead)
unbind = SUPER, BACKSPACE      # was: toggle transparency (now close window)
unbind = SUPER, code:20        # was: resize window left (use SUPER+SHIFT+arrows instead)
unbind = SUPER, code:21        # was: resize window right (use SUPER+SHIFT+arrows instead)

# Ghostty terminal on workspace 0
bindd = SUPER, Grave, Ghostty terminal, exec, omarchy-launch-or-focus com.mitchellh.ghostty "uwsm-app -- ghostty"

# Close window
bindd = SUPER, Backspace, Close window, killactive,

# Vim-style window navigation
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, J, Move focus down, movefocus, d
bindd = SUPER, K, Move focus up, movefocus, u
bindd = SUPER, L, Move focus right, movefocus, r

# macOS muscle memory (global Cmd-like shortcuts)
bindd = SUPER, A, Select all, sendshortcut, CTRL, A,
bindd = SUPER, Z, Undo, sendshortcut, CTRL, Z,
# SUPER+C (copy), SUPER+X (cut), SUPER+V (paste) from omarchy clipboard defaults

# Workspace layout: 1 2 E Y G B M
# (1 and 2 from omarchy defaults, E/Y/G/B/M added here)
bindd = SUPER, E, Switch to workspace 3, workspace, 3
bindd = SUPER, Y, Switch to workspace 4, workspace, 4
bindd = SUPER, G, Switch to workspace 5, workspace, 5
bindd = SUPER, B, Switch to workspace 6, workspace, 6
bindd = SUPER, M, Switch to workspace 7, workspace, 7

bindd = SUPER SHIFT, E, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, Y, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, G, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, B, Move window to workspace 6, movetoworkspace, 6

# Cursor zoom
bindd = SUPER, equal, Zoom in, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
bindd = SUPER, minus, Zoom out, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')
bindd = SUPER, KP_ADD, Zoom in (numpad), exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
bindd = SUPER, KP_SUBTRACT, Zoom out (numpad), exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')
bindd = SUPER, KP_0, Reset zoom, exec, hyprctl -q keyword cursor:zoom_factor 1
