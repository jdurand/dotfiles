# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"

# Unbind omarchy defaults that conflict with QWEASDZXC workspace grid
unbind = SUPER, W            # was: close window (moved to SUPER+Delete below)
unbind = SUPER, S            # was: toggle scratchpad (moved to SUPER+Grave below)
unbind = SUPER, C            # was: universal copy (use Ctrl+C instead)
unbind = SUPER, X            # was: universal cut (use Ctrl+X instead)
unbind = SUPER, code:20      # was: resize window left (use SUPER+SHIFT+arrows instead)
unbind = SUPER, code:21      # was: resize window right (use SUPER+SHIFT+arrows instead)

# Relocated bindings
bindd = SUPER, Delete, Close window, killactive,
bindd = SUPER, Grave, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, Grave, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# QWEASDZXC workspace grid (workspaces 4-12)
#   Q W E
#   A S D
#   Z X C
bindd = SUPER, Q, Switch to workspace 4, workspace, 4
bindd = SUPER, W, Switch to workspace 5, workspace, 5
bindd = SUPER, E, Switch to workspace 6, workspace, 6
bindd = SUPER, A, Switch to workspace 7, workspace, 7
bindd = SUPER, S, Switch to workspace 8, workspace, 8
bindd = SUPER, D, Switch to workspace 9, workspace, 9
bindd = SUPER, Z, Switch to workspace 10, workspace, 10
bindd = SUPER, X, Switch to workspace 11, workspace, 11
bindd = SUPER, C, Switch to workspace 12, workspace, 12

bindd = SUPER SHIFT, Q, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, W, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, E, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, A, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, S, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, D, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, Z, Move window to workspace 10, movetoworkspace, 10
bindd = SUPER SHIFT, X, Move window to workspace 11, movetoworkspace, 11
bindd = SUPER SHIFT, C, Move window to workspace 12, movetoworkspace, 12

# Cursor zoom
bindd = SUPER, equal, Zoom in, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
bindd = SUPER, minus, Zoom out, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')
bindd = SUPER, KP_ADD, Zoom in (numpad), exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
bindd = SUPER, KP_SUBTRACT, Zoom out (numpad), exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')
bindd = SUPER, KP_0, Reset zoom, exec, hyprctl -q keyword cursor:zoom_factor 1
