# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Dual monitor setup: main (top) + smaller (bottom)
# Run `hyprctl monitors` to verify port names and adjust as needed
env = GDK_SCALE,2

# Main monitor (top) — BenQ PD3225U 32" 4K (max 60Hz)
# Pick one of the following. DPI figures are effective UI density.
  monitor = DP-3, 3840x2160@60, 0x0, 1.5                     # 4K, scale 1.5 — comfy UI, ~92 DPI equiv (recommended)
# monitor = DP-3, 3840x2160@60, 0x0, 1.0                     # 4K native, ~138 DPI — max real estate, tiny UI
# monitor = DP-3, 3840x2160@60, 0x0, 1.25                    # 4K, scale 1.25 — close to old 27" 1440p feel
# monitor = DP-3, 3840x2160@60, 0x0, 2.0                     # 4K, scale 2.0 — HiDPI/Retina-like, large UI
# monitor = DP-3, 2560x1440@60, 0x0, 1.0                     # 1440p — slightly soft, lower power, more real estate than 1080p
# monitor = DP-3, preferred,    0x0, auto                    # let Hyprland pick from EDID

# Second monitor (bottom) — Acer PM161QT 16" 1080p portable touchscreen
# auto-center-down keeps it centered under the main monitor regardless of
# the main monitor's resolution, so swapping displays won't break the layout
# monitor = HDMI-A-1, 1920x1080@60, auto-center-down, 1.0    # native — small UI, ~138 DPI (recommended for screen real estate)
  monitor = HDMI-A-1, 1920x1080@60, auto-center-down, 1.25   # slight scaling, ~110 DPI equiv
# monitor = HDMI-A-1, 1920x1080@60, auto-center-down, 1.5    # comfy UI, ~92 DPI equiv
# monitor = HDMI-A-1, 1600x900@60,  auto-center-down, 1.0    # lower res, larger UI, fewer pixels
# monitor = HDMI-A-1, preferred,    auto-center-down, 1.0    # let Hyprland pick from EDID

# Fallback for any other/hotplugged monitors
monitor = , preferred, auto, auto

# Independent workspaces per monitor
# Main (top): workspaces 1-5, Secondary (bottom): workspaces 6-10
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3
workspace = 6, monitor:HDMI-A-1, default:true
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
