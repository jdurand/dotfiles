# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Dual monitor setup: main (top) + smaller (bottom)
# Run `hyprctl monitors` to verify port names and adjust as needed
env = GDK_SCALE,2

# Main monitor (top) — HDMI-A-1 detected
# Position 0x0 = top-left origin
monitor = HDMI-A-1, preferred, 0x0, auto

# Second monitor (bottom) — update port name once connected
# Common ports: DP-1, DP-2, DP-3, HDMI-A-2
# Position below main: 0x[main_height]. Adjust Y to match main monitor height.
# monitor = DP-1, preferred, 0x1080, auto

# Fallback for any other/hotplugged monitors
monitor = , preferred, auto, auto

# Independent workspaces per monitor
# Main (top): workspaces 1-5, Secondary (bottom): workspaces 6-10
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
# workspace = 6, monitor:DP-1, default:true
# workspace = 7, monitor:DP-1
# workspace = 8, monitor:DP-1
# workspace = 9, monitor:DP-1
# workspace = 10, monitor:DP-1
