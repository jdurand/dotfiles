#
# Matrix / Cyberpunk Green Theme
#

# Nerd Fonts for icons
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left
set -g @nova-nerdfonts-right

# Pane Border Styling
set -g @nova-pane-active-border-style "#00ff41"   # Matrix green for active pane
set -g @nova-pane-border-style "#0a1a0a"          # Dark green-black for inactive pane

# Status Bar Styling
set -g @nova-status-style-bg "#0a1a0a"            # Dark background
set -g @nova-status-style-fg "#00ff41"            # Matrix green foreground
set -g @nova-status-style-active-bg "#00ff41"     # Active window background (Matrix green)
set -g @nova-status-style-active-fg "#0a1a0a"     # Active window foreground (dark)
set -g @nova-status-style-double-bg "#00994d"     # Dimmer green for highlighted section

# Pane Content Display
set -g @nova-pane "#I#{?pane_in_mode,  #{pane_mode},}  #W"

# Mode Segment
set -g @nova-segment-mode "#{?client_prefix,,}"
set -g @nova-segment-mode-colors "#00ff41 #0a1a0a"

# Session Name Segment
set -g @nova-segment-session "#S"
set -g @nova-segment-session-colors "#00ff41 #0a1a0a"

# User Info Segment
set -g @nova-segment-whoami "#(whoami)@#h"
set -g @nova-segment-whoami-colors "#00cc33 #0a1a0a"

# Segment Arrangement
set -g @nova-rows 0
set -g @nova-segments-0-left "mode"
set -g @nova-segments-0-right "session whoami"
