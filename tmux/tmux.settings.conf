# Custom Settings
# -----------------------------------------------------------------------------

# Set the delay between prefix ad command
set -s escape-time 1

# Set repeat time to 800ms
set -g repeat-time 800

# Set escape time to 50 milliseconds (makes Vim escape quicker but could mess up on remote)
set -g escape-time 50

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Allows passthrough of escape sequences
set-option -g allow-passthrough on

# Enable focus-events
set-option -g focus-events on

# Update SSH vars when a new client attaches so theme can switch
# between local (electric-neon) and remote (matrix) sessions dynamically.
# SSH_CONNECTION is in the default list; add SSH_CLIENT and SSH_TTY.
set -ga update-environment " SSH_CLIENT SSH_TTY"

# Re-source the correct theme whenever a client attaches, then
# re-run the nova plugin so the @nova-* vars become actual styles,
# and refresh clients to trigger FocusGained in nvim.
set-hook -g client-attached 'run-shell " \
  if tmux show-env SSH_CONNECTION 2>/dev/null | grep -qv ^-; then \
    tmux source-file $HOME/.tmux/themes/tmux.matrix.conf; \
  else \
    tmux source-file $HOME/.tmux/themes/tmux.electric-neon.conf; \
  fi; \
  $HOME/.tmux/plugins/tmux-nova/nova.tmux; \
  tmux list-clients -F \"#{client_name}\" | while read c; do \
    tmux refresh-client -t \"\$c\"; \
  done"'

# Allow mouse actions
set -g mouse on

# Customize tmux line
set-option -g status-position top
# set-option -g status-position bottom

#
# Customize theme
#
# set -g window-style 'bg=default'
# set -g window-active-style 'bg=#25273a'

# Set transparent background
set-window-option -g window-style bg=terminal
set-window-option -g window-active-style bg=terminal
